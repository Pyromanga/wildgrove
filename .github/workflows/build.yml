name: Build Pipeline

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  check-trigger:
    runs-on: ubuntu-latest
    if: contains(github.event.head_commit.message, 'App')
    steps:
      - run: echo "Triggered by App commit"

  prepare:
    needs: check-trigger
    uses: ./.github/workflows/jobs/prepare.yml

  run-tests:
    needs: prepare
    uses: ./.github/workflows/jobs/test-logic.yml

  build-android:
    needs: run-tests
    uses: ./.github/workflows/jobs/build-apk.yml