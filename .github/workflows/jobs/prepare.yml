name: Prepare Source

on:
  workflow_call:
    outputs:
      source_ready:
        description: "Bestätigung dass Source bereit ist"
        value: ${{ jobs.prepare.outputs.ready }}

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      ready: "true"
    steps:
      - uses: actions/checkout@v4
      - name: Setup Source
        run: |
          mkdir -p working_dir
          if [ -f "zip/game.zip" ]; then
            echo "Zip gefunden, entpacke game.zip..."
            unzip -q zip/game.zip -d working_dir
          else
            echo "Kein Zip gefunden, nutze Repo-Dateien..."
            # Kopiert alles außer .git und den zip Ordner
            rsync -av --exclude='.git' --exclude='zip' ./ working_dir/
          fi
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: source-code
          path: working_dir/