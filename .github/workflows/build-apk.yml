name: Build Android APK

on:
  push:
      branches: [ "main", "develop" ]
        pull_request:
            branches: [ "main" ]
              workflow_dispatch: # Manueller Trigger über GitHub UI

              # WICHTIG: Schreibrechte für Releases hinzufügen
              permissions:
                contents: write

                env:
                  GODOT_VERSION: "4.3"
                    EXPORT_NAME: "WildGrove"
                      PROJECT_PATH: "."

                      jobs:
                        build-android:
                            name: Build Android APK
                                runs-on: ubuntu-22.04
                                    timeout-minutes: 30

                                        steps:
                                              # --- 1. Repo auschecken ---
                                                    - name: Checkout repository
                                                            uses: actions/checkout@v4
                                                                    with:
                                                                              lfs: true

                                                                                    # --- 2. Java 17 installieren ---
                                                                                          - name: Set up Java 17
                                                                                                  uses: actions/setup-java@v4
                                                                                                          with:
                                                                                                                    distribution: temurin
                                                                                                                              java-version: 17

                                                                                                                                    # --- 3. Android SDK einrichten ---
                                                                                                                                          - name: Set up Android SDK
                                                                                                                                                  uses: android-actions/setup-android@v3

                                                                                                                                                        - name: Install Android build tools & NDK
                                                                                                                                                                run: |
                                                                                                                                                                          sdkmanager \
                                                                                                                                                                                      "platform-tools" \
                                                                                                                                                                                                  "platforms;android-34" \
                                                                                                                                                                                                              "build-tools;34.0.0" \
                                                                                                                                                                                                                          "ndk;23.2.8568313"

                                                                                                                                                                                                                                # --- 4. Godot + Templates herunterladen ---
                                                                                                                                                                                                                                      - name: Download Godot ${{ env.GODOT_VERSION }}
                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                        GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
                                                                                                                                                                                                                                                                  wget -q "${GODOT_URL}/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip" -O godot.zip
                                                                                                                                                                                                                                                                            unzip -q godot.zip
                                                                                                                                                                                                                                                                                      sudo mv "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
                                                                                                                                                                                                                                                                                                sudo chmod +x /usr/local/bin/godot

                                                                                                                                                                                                                                                                                                      - name: Download Android export templates
                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                        GODOT_URL="https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable"
                                                                                                                                                                                                                                                                                                                                  TPL_FILE="Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
                                                                                                                                                                                                                                                                                                                                            wget -q "${GODOT_URL}/${TPL_FILE}" -O templates.tpz
                                                                                                                                                                                                                                                                                                                                                      mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
                                                                                                                                                                                                                                                                                                                                                                unzip -q templates.tpz -d /tmp/templates
                                                                                                                                                                                                                                                                                                                                                                          mv /tmp/templates/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/

                                                                                                                                                                                                                                                                                                                                                                                # --- 5. Debug-Keystore erstellen ---
                                                                                                                                                                                                                                                                                                                                                                                      - name: Generate debug keystore
                                                                                                                                                                                                                                                                                                                                                                                              run: |
                                                                                                                                                                                                                                                                                                                                                                                                        keytool -genkey -v \
                                                                                                                                                                                                                                                                                                                                                                                                                    -keystore debug.keystore \
                                                                                                                                                                                                                                                                                                                                                                                                                                -alias androiddebugkey \
                                                                                                                                                                                                                                                                                                                                                                                                                                            -keyalg RSA \
                                                                                                                                                                                                                                                                                                                                                                                                                                                        -keysize 2048 \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                    -validity 10000 \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                -storepass android \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            -keypass android \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        -dname "CN=Debug, O=Android, C=US"

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # --- 6. Export-Preset konfigurieren ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Ensure export_presets.cfg exists
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      PRESETS_FILE="${PROJECT_PATH}/export_presets.cfg"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if [ ! -f "$PRESETS_FILE" ]; then
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            echo "Keine export_presets.cfg gefunden - erstelle Debug-Preset..."
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        cat > "$PRESETS_FILE" << 'EOF'
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  [preset.0]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            name="Android"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      platform="Android"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                runnable=true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          export_filter="all_resources"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    export_path="build/android/WildGrove-debug.apk"

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              [preset.0.options]
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        architectures/arm64-v8a=true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  keystore/debug="../../debug.keystore"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            keystore/debug_user="androiddebugkey"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      keystore/debug_password="android"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                package/unique_name="com.yourname.wildgrove"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          package/name="WildGrove"
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    package/signed=true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              screen/immersive_mode=true
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        EOF
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  fi

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        # --- 7. Versionierung ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Set version code
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                VERSION_CODE=$(git rev-list --count HEAD)
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          echo "VERSION_CODE=${VERSION_CODE}" >> $GITHUB_ENV
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    sed -i "s/config\/version=.*/config\/version=\"0.1.${VERSION_CODE}\"/" "${PROJECT_PATH}/project.godot"

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          # --- 8. Verzeichnisse & Import ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                - name: Create output directory
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        run: mkdir -p "${PROJECT_PATH}/build/android"

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              - name: Import project assets
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                      run: godot --headless --editor --quit || true

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            # --- 9. APK exportieren ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  - name: Export APK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          run: |
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    godot --headless \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                --export-debug "Android" \
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            "${PROJECT_PATH}/build/android/${EXPORT_NAME}-debug.apk"

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  # --- 10. Artifact hochladen ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        - name: Upload APK artifact
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                uses: actions/upload-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  name: WildGrove-debug-APK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            path: build/android/*.apk

                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              # --- 11. Optional: Release ---
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                release:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    name: Create GitHub Release
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        needs: build-android
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            runs-on: ubuntu-22.04
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                if: startsWith(github.ref, 'refs/tags/v')
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    steps:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          - name: Download APK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                  uses: actions/download-artifact@v4
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                          with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    name: WildGrove-debug-APK
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              path: ./release
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    - name: Create Release
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                            uses: softprops/action-gh-release@v2
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    with:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                              files: ./release/*.apk
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                        env:
                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                                    GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}name